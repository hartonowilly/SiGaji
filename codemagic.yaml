# Monorepo SiGaji — app Flutter di subfolder sigaji_mobile
workflows:
  sigaji-mobile-android:
    name: SiGaji Absen Android
    max_build_duration: 60
    instance_type: mac_mini_m2
    working_directory: sigaji_mobile
    environment:
      flutter: stable
    scripts:
      - name: Download MobileFaceNet model
        script: |
          mkdir -p assets/models
          curl -L -o assets/models/mobilefacenet.tflite \
            https://github.com/MCarlomagno/FaceRecognitionAuth/raw/master/assets/mobilefacenet.tflite
      - name: Get packages
        script: flutter pub get
      - name: Build APK
        script: flutter build apk --release --target-platform android-arm64
    artifacts:
      - build/app/outputs/flutter-apk/*.apk

  sigaji-mobile-ios:
    name: SiGaji Absen iOS (no codesign)
    max_build_duration: 60
    instance_type: mac_mini_m2
    working_directory: sigaji_mobile
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: Download MobileFaceNet model
        script: |
          mkdir -p assets/models
          curl -L -o assets/models/mobilefacenet.tflite \
            https://github.com/MCarlomagno/FaceRecognitionAuth/raw/master/assets/mobilefacenet.tflite
      - name: Get packages
        script: flutter pub get
      - name: CocoaPods
        script: |
          cd ios
          pod install
      - name: Build iOS (unsigned IPA untuk sideload manual)
        script: flutter build ipa --release --export-method development
    artifacts:
      - build/ios/ipa/*.ipa
