# SiGaji monorepo - Flutter di sigaji_mobile/
# Branch build: master
workflows:
  sigaji-android:
    name: SiGaji Absen Android
    max_build_duration: 60
    instance_type: mac_mini_m2
    working_directory: sigaji_mobile
    environment:
      flutter: stable
    scripts:
      - name: Download MobileFaceNet model
        script: |
          mkdir -p assets/models
          curl -L -o assets/models/mobilefacenet.tflite \
            https://github.com/MCarlomagno/FaceRecognitionAuth/raw/master/assets/mobilefacenet.tflite
      - name: Get packages
        script: flutter pub get
      - name: Build APK
        script: flutter build apk --release --target-platform android-arm64
    artifacts:
      - build/app/outputs/flutter-apk/*.apk

  sigaji-ios-sideload:
    name: SiGaji iOS Sideload 7 hari
    max_build_duration: 90
    instance_type: mac_mini_m2
    working_directory: sigaji_mobile
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Download MobileFaceNet model
        script: |
          mkdir -p assets/models
          curl -L -o assets/models/mobilefacenet.tflite \
            https://github.com/MCarlomagno/FaceRecognitionAuth/raw/master/assets/mobilefacenet.tflite
      - name: Prepare iOS
        script: bash scripts/prepare_ios_codemagic.sh
      - name: Build iOS unsigned
        script: |
          flutter build ios --release --no-codesign
          test -d build/ios/iphoneos/Runner.app
      - name: Package IPA
        script: bash scripts/package_unsigned_ipa.sh
    artifacts:
      - build/ios/sideload/*.ipa
