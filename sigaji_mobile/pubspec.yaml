name: sigaji_mobile
description: SiGaji Absen — app internal Android & iOS (absensi wajah + cuti)
publish_to: 'none'
version: 1.1.0+2

environment:
  sdk: '>=3.12.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.8.4
  http: ^1.2.2
  http_parser: ^4.0.2
  geolocator: ^13.0.2
  image_picker: ^1.1.2
  file_picker: ^8.1.4
  permission_handler: ^11.3.1
  google_mlkit_face_detection: ^0.12.0
  tflite_flutter: ^0.12.1
  image: ^4.3.0
  shared_preferences: ^2.3.3
  intl: ^0.19.0
  camera: ^0.12.0+1
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/models/mobilefacenet.tflite
