# Deploy folder ini ke Netlify (drag & drop atau Git).
# Situs hanya menyajikan file; data tetap di localStorage per perangkat/browser.

[build]
  command = "npm install && npm run build"
  publish = "."

[functions]
  directory = "netlify/functions"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate, max-age=0"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate, max-age=0"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate, max-age=0"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate, max-age=0"
